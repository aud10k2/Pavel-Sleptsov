<title>Если жизнь тебя обманет</title>
</head>
<body>
<h2>Если жизнь тебя обманет</h2>
<p>А.С. Пушкин</p>
<br>
<p>Если жизнь тебя обманет,</p>
<p>Не печалься, не сердись!</p>
<p>В день уныния смирись:</p>
<p>День веселья, верь, настанет.</p>
<br>
<p>Сердце в будущем живет;</p>
<p>Настоящее уныло:</p>
<p>Все мгновенно, все пройдет;</p>
<p>Что пройдет, то будет мило.</p>
</body>
