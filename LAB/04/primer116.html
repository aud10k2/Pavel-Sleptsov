<head>

    <style type='text/css'>
        p { font: 20 Garamond; }
        span { font: 26px Arial; color: blue; }
    </style>
</head>

<body>
    <p>Внедренная таблица стилей для элементов <span>&lt;p&gt;</span> и <span>&lt;span&gt;</span>.</p>
